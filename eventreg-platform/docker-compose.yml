version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: eventreg-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eventreg_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: eventreg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql-data:
